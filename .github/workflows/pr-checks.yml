name: PR Validation Checks

on:
  pull_request:
    branches:
      - main

jobs:

  file-size-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for files larger than 1MB
        run: |
          large_files=$(find . -type f -size +1M)
          if [ -n "$large_files" ]; then
            echo "❌ Files larger than 1MB found:"
            echo "$large_files"
            exit 1
          else
            echo "✅ All files are under 1MB"
          fi

  branch-name-check:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Branch Name
        run: |
          BRANCH=${{ github.head_ref }}
          echo "Branch name: $BRANCH"

          if [[ "$BRANCH" =~ ^(feature/|fix/|docs/).* ]]; then
            echo "✅ Branch naming convention valid"
          else
            echo "❌ Invalid branch name"
            exit 1
          fi

  pr-body-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check PR Description
        run: |
          BODY="${{ github.event.pull_request.body }}"
          if [ -z "$BODY" ]; then
            echo "⚠️ Warning: PR description is empty"
          else
            echo "✅ PR description present"
          fi