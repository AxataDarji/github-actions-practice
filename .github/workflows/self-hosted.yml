name: Self-Hosted Runner Demo

on: [push]

jobs:
  self-hosted-job:
    runs-on: self-hosted
    steps:
      - name: Print Hostname
        run: hostname
      - name: Print Working Directory
        run: pwd
      - name: Create Test File
        run: echo "Hello from self-hosted runner" > test-file.txt
      - name: List Files
        run: ls -l